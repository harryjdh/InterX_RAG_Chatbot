name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11.12"
          cache: "pip"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run unit tests
        run: pytest -m "not integration" --tb=short -q

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: ragdb_test
          POSTGRES_USER: raguser
          POSTGRES_PASSWORD: ragpassword_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U raguser -d ragdb_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: ragdb_test
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ragpassword_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11.12"
          cache: "pip"

      - name: Install dev + build dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install -r requirements-build.txt

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run integration tests
        run: pytest -m integration --tb=short -q
